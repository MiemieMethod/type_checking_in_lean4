name: build and deploy Chinese mdBook to gh-pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install --version ${MDBOOK_VERSION} mdbook

      - name: Build Chinese book
        run: mdbook build

      - name: Deploy Chinese book to gh-pages
        if: github.event_name == 'push' && github.ref_name == 'main'
        run: |
          touch book/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add -B gh-pages gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            git -C gh-pages-worktree checkout --orphan gh-pages
          fi
          find gh-pages-worktree -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a book/. gh-pages-worktree/
          cd gh-pages-worktree
          git add -A
          git commit -m "Deploy Chinese book to GitHub Pages" || exit 0
          git push origin gh-pages
